name: Release SlurmTUI 📦 to PyPI

on: workflow_dispatch

jobs:
  release:
    name: Build, tag, release, and publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for trusted publishing to PyPI
      contents: write # Required for creating tags and GitHub releases

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Extract version from package
        id: get_version
        run: |
          VERSION=$(python -c "import sys; sys.path.insert(0, 'src'); from slurmtui._version import __version__; print(__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      # - name: Create and push tag
      #   run: |
      #     git config --local user.email "action@github.com"
      #     git config --local user.name "GitHub Action"
      #     git tag -a "v${{ steps.get_version.outputs.version }}" -m "Release v${{ steps.get_version.outputs.version }}"
      #     git push origin "v${{ steps.get_version.outputs.version }}"

      - name: Install build dependencies
        run: python -m pip install build --user

      - name: Build wheel and source tarball
        run: python -m build --sdist --wheel --outdir dist/ .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          files: dist/*

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
